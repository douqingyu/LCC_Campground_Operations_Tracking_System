<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - LCC Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <div class="container">
      <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-sm-auto">
            <div class="text-center mb-4">
                <h1>LCC Issue Tracker</h1>
                <p class="text-muted">Lincoln Community Campground Issue Tracking System</p>
            </div>
            
            <div class="bg-primary text-white border border-bottom-0 rounded-top text-center">
                <h2 class="p-3 m-0">Log in</h2>
            </div>
            
            <div class="bg-white border container">
                <form class="p-3" action="{{ url_for('login') }}" method="post">
                  <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control{% if username_invalid %} is-invalid{% endif %}" 
                           id="username" name="username" placeholder="Enter your username..." 
                           maxlength=20 value="{{ username }}" required>
                    <div class="invalid-feedback">Account not found</div>
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control{% if password_invalid %} is-invalid{% endif %}" 
                           id="password" name="password" placeholder="Enter your password..." required>
                    <div class="invalid-feedback">Incorrect password</div>
                  </div>
                  <div class="text-center">
                    <button type="submit" class="btn btn-primary">Log In</button>
                  </div>
                </form>
            </div>
            
            <div class="bg-white border border-top-0 rounded-bottom text-center">
                <div class="p-2">New to LCC? <a href="{{ url_for('signup') }}">Register here</a></div>
            </div>
        </div>
      </div>
    </div>

    <footer class="fixed-bottom py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">
                Created by QINGYU DOU (Student ID: 1162026)
            </span>
        </div>
    </footer>
  </body>
</html>
