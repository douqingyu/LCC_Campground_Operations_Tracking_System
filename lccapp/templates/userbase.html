<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %} - LCC Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <nav class="navbar navbar-expand-sm navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">LCC Issue Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link{{' active' if active_page=='home' else ''}}" 
                           href="{% if session['role'] == 'visitor' %}{{ url_for('visitor_home') }}
                                 {% elif session['role'] == 'helper' %}{{ url_for('helper_home') }}
                                 {% elif session['role'] == 'admin' %}{{ url_for('admin_home') }}{% endif %}">Home</a>
                    </li>
                    {% if session['role'] == 'admin' %}
                    <li class="nav-item">
                        <a class="nav-link{{' active' if active_page=='users' else ''}}" 
                           href="{{ url_for('manage_users') }}">Manage Users</a>
                    </li>
                    {% endif %}
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link{{' active' if active_page=='profile' else ''}}" 
                           href="{{ url_for('profile') }}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-5 py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">
                LCC Issue Tracker | Created by QINGYU DOU (Student ID: 1162026)
            </span>
        </div>
    </footer>
</body>
</html>
